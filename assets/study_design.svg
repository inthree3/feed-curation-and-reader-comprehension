<svg width="680" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Study design flowchart</title>
  <desc>Flowchart: GDELT dataset to feed construction, three participant groups, survey, and analysis</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- GDELT Dataset -->
  <rect x="160" y="30" width="360" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="52" text-anchor="middle" dominant-baseline="central">GDELT dataset</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="70" text-anchor="middle" dominant-baseline="central">63 articles · url · title · seendate · domain · country</text>

  <!-- Arrow -->
  <line x1="340" y1="86" x2="340" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Feed Construction -->
  <rect x="230" y="118" width="220" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="140" text-anchor="middle" dominant-baseline="central">Feed construction</text>

  <!-- Fan-out arrows -->
  <path d="M290 162 L110 218" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="162" x2="340" y2="218" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M390 162 L570 218" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Epistemic feed -->
  <rect x="30" y="218" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" x="110" y="239" text-anchor="middle" dominant-baseline="central">Epistemic feed</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="110" y="257" text-anchor="middle" dominant-baseline="central">6 dims · κ &gt; 0.70</text>

  <!-- Recency feed -->
  <rect x="260" y="218" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="340" y="239" text-anchor="middle" dominant-baseline="central">Recency feed</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="257" text-anchor="middle" dominant-baseline="central">Sorted by seendate</text>

  <!-- Engagement feed -->
  <rect x="490" y="218" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="570" y="239" text-anchor="middle" dominant-baseline="central">Engagement feed</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="570" y="257" text-anchor="middle" dominant-baseline="central">Buzzsumo data</text>

  <!-- Arrows to groups -->
  <line x1="110" y1="274" x2="110" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="274" x2="340" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="274" x2="570" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Epistemic group -->
  <rect x="30" y="330" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C" x="110" y="351" text-anchor="middle" dominant-baseline="central">Epistemic group</text>
  <text font-family="sans-serif" font-size="12" fill="#534AB7" x="110" y="369" text-anchor="middle" dominant-baseline="central">n = 27</text>

  <!-- Recency group -->
  <rect x="260" y="330" width="160" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C" x="340" y="351" text-anchor="middle" dominant-baseline="central">Recency group</text>
  <text font-family="sans-serif" font-size="12" fill="#0F6E56" x="340" y="369" text-anchor="middle" dominant-baseline="central">n = 23</text>

  <!-- Engagement group -->
  <rect x="490" y="330" width="160" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C" x="570" y="351" text-anchor="middle" dominant-baseline="central">Engagement group</text>
  <text font-family="sans-serif" font-size="12" fill="#993C1D" x="570" y="369" text-anchor="middle" dominant-baseline="central">n = 22</text>

  <!-- Converging arrows to survey -->
  <path d="M110 386 L110 440 L270 470" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="386" x2="340" y2="458" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M570 386 L570 440 L410 470" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Survey -->
  <rect x="190" y="458" width="300" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="479" text-anchor="middle" dominant-baseline="central">Survey · Q1–Q27</text>
  <text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="340" y="497" text-anchor="middle" dominant-baseline="central">Screening · Accuracy · Impressions · Demographics</text>

  <!-- Arrow -->
  <line x1="340" y1="514" x2="340" y2="548" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Analysis -->
  <rect x="180" y="548" width="320" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53" x="340" y="569" text-anchor="middle" dominant-baseline="central">Analysis</text>
  <text font-family="sans-serif" font-size="12" fill="#185FA5" x="340" y="587" text-anchor="middle" dominant-baseline="central">Weighted κ · Calibration curve · Accuracy by feed</text>
</svg>
